# AyurPost gazetteer — controlled vocabulary for deterministic entity extraction
#
# Used by the CODE pass (not the LLM) to fill the entity metadata fields on each
# chunk. The dosha vocabulary below drives `doshas_mentioned`, which is the ONE
# HARD retrieval filter — so false positives here directly corrupt recall.
#
# Provenance: corpus-grounded, verified 2026-06-09.
#   Method: counted every candidate synonym (word-boundary, NFKD-folded) across
#   Sushruta Vols 1-3 (Document AI OCR) + Charaka Vol 1 + Ashtanga Hridayam, and
#   inspected the usage context of every rare term.
#   Result: the classical Sanskrit dosha synonyms (anila, marut, pavana, samirana,
#   prabhanjana, tejas, anala, soma, balasa) were DROPPED — in these English
#   translations they appear as the physical element "air/wind/fire" or are
#   otherwise ambiguous (soma = moon/plant/body), not as dosha labels. Keeping them
#   would mis-tag five-elements-theory chunks. `sleshma`/`shleshma` was KEPT: it is
#   Bhishagratna's primary word for Kapha in Sushruta (51 hits) and is not obvious
#   from memory. `vayu` is the *dominant* word for the Vata dosha in Sushruta (1295
#   hits, more than "vata" itself).
#
# Matcher contract (to honor when the matcher is built):
#   Both the corpus text AND these terms are normalized before matching —
#   lowercase, NFKD diacritic strip, collapse internal hyphens/whitespace, then
#   word-boundary phrase match. Accents are therefore NOT listed here (vāta folds
#   to vata). Forms that differ by a REAL letter are distinct and ARE listed
#   separately (sleshma vs shleshma; kapham vs kapha). Derived stems (vataja,
#   pittaja, kaphaja) are listed explicitly because \b-matching won't reach them
#   from the root.

version: 1

doshas:
  vata:  [vata, vataja, vatika, vata-dosha, vayu]
  pitta: [pitta, pittam, pittaja, paittika, pitta-dosha]
  kapha: [kapha, kapham, kaphaja, kaphic, kapha-dosha, sleshma, shleshma, shleshman]

# dosha_combinations — multi-dosha conditions (dual + tridosha).
# Corpus-grounded, verified 2026-06-09. Value set is CLOSED and complete:
#   vata-pitta | vata-kapha | pitta-kapha | tridosha
# This is the saptavidha (sevenfold) prakriti enumeration minus the 3 singles
# (already in doshas_mentioned): C(3,2)=3 duals + 1 tridosha. No other pair exists.
#
# Extraction rule (CODE pass):
#   1. explicit pair token present        -> that pair
#   2. dual-classifier token present      -> resolve the pair from doshas_mentioned,
#                                            but ONLY when doshas_mentioned holds exactly 2
#                                            (the two fields reinforce each other)
#   3. tridosha-classifier token present  -> "tridosha"
# Both hyphenated and concatenated surface forms are listed because the corpus
# carries both (vata-pitta 19, vatapitta 4) and the matcher's separator handling
# is not yet finalized — listing both is matcher-independent and safe.
# Note: rakta is NOT a dosha. Tokens like "vata-pitta-raktaja" still yield the
# vata-pitta pair; the rakta (blood) axis is a separate dushya, out of scope here.
dosha_combinations:
  pairs:
    vata-pitta:  [vata-pitta, vatapitta]
    vata-kapha:  [vata-kapha, vatakapha]
    pitta-kapha: [pitta-kapha, pittakapha]
  dual_classifiers:     [dvandvaja, samsarga, samsargaja]   # pair <- doshas_mentioned (when ==2)
  tridosha_classifiers: [sannipata, sannipataja, tridosha, tridoshaja]   # -> "tridosha"

# ── herbs / dravya — fills `herbs` (SOFT signal, NOT a hard filter) ──────────
# Provenance: corpus-grounded across Sushruta vols 1-3 (folded word-boundary
# counts), verified 2026-06-09. Inclusion = >=4 corpus hits AND the medicinal-
# substance sense clearly dominant. Forms are NFKD-folded (no accents) per the
# matcher contract above. PROVISIONAL — domain judgment, clinician-reviewable
# (these tags are internal retrieval metadata, never published content).
# DROPPED as polysemous (would mis-tag non-drug passages, same logic as the
# dropped dosha synonyms): arka (sun/distillate), bala (strength — see age_phase
# note), vacha (speech), nagara (city), kola (a measure / hog). Food-grains
# yava/masha/mudga/shali are KEPT (dietary dravya; weight-measure sense is a minority).
herbs:
  pippali:    [pippali]          # long pepper
  maricha:    [maricha]          # black pepper
  saindhava:  [saindhava]        # rock salt
  haridra:    [haridra]          # turmeric
  chitraka:   [chitraka]         # Plumbago zeylanica
  vidanga:    [vidanga]          # Embelia ribes
  madhuka:    [madhuka]          # liquorice
  nimba:      [nimba, nimva]     # neem
  trivrit:    [trivrit]          # Operculina turpethum
  triphala:   [triphala]         # three-myrobalan formulation
  haritaki:   [haritaki]         # Terminalia chebula
  musta:      [musta]            # Cyperus rotundus
  chandana:   [chandana]         # sandalwood
  amalaka:    [amalaka, amalaki] # Emblica officinalis (amla)
  madana:     [madana]           # Randia dumetorum
  draksha:    [draksha]          # grapes / raisins
  danti:      [danti]            # Baliospermum montanum
  guduchi:    [guduchi]          # Tinospora cordifolia

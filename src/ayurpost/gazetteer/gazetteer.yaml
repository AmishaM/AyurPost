# ── diseases / roga — fills `diseases` (SOFT signal, NOT a hard filter) ──────
# Same provenance / threshold / contract as herbs. PROVISIONAL — clinician-reviewable.
# DROPPED: udara (mostly anatomical "abdomen"), shula (pain / spear — ambiguous).
# NOTE: kushtha is also the herb Saussurea costus; the skin-disease sense dominates
# in this corpus so it is kept as a disease, but the collision is real.
diseases:
  kushtha:    [kushtha]          # skin diseases (also a herb — see note)
  prameha:    [prameha, meha]    # urinary disorders / diabetes family
  gulma:      [gulma]            # abdominal lump / tumour
  vrana:      [vrana]            # ulcer / wound
  granthi:    [granthi]          # cyst / glandular swelling
  vidradhi:   [vidradhi]         # abscess
  atisara:    [atisara]          # diarrhoea
  pidaka:     [pidaka]           # pustule / boil
  visarpa:    [visarpa]          # erysipelas / spreading inflammation
  pandu:      [pandu]            # anaemia
  krimi:      [krimi]            # worms / parasites
  grahani:    [grahani]          # sprue / malabsorption
  apasmara:   [apasmara]         # epilepsy
  kamala:     [kamala]           # jaundice
  bhagandara: [bhagandara]       # fistula-in-ano
  kshaya:     [kshaya]           # consumption / wasting
  kasa:       [kasa]             # cough
  jvara:      [jvara]            # fever
  slipada:    [slipada]          # filariasis / elephantiasis
  kilasa:     [kilasa]           # vitiligo / leucoderma
  unmada:     [unmada]           # insanity
  galaganda:  [galaganda]        # goitre
  arsha:      [arsha]            # haemorrhoids / piles

# --- DECIDED 2026-06-09 — age_phase is NOT a gazetteer field (no key emitted) ---
# Corpus-proven unbuildable as a term lookup: the Sanskrit category word is absent
# (vayah 0, vaya 4), and EVERY stage token is contaminated —
#   bala     = strength / a herb (not only "child")
#   madhyama = "middle" of anything (path, dose), not middle-age
#   vriddhi  = dosha INCREASE (not old age);  vriddha = the "old" Sushruta recension / a herb
#   kaumara  = the pediatrics SPECIALTY (Kaumara-bhritya), not a patient's life-stage
# A gazetteer here would be mostly false positives. The actual age->dosha mapping
# (Kapha childhood / Pitta middle age / Vata old age) lives in ~1 PROSE passage, so it
# is a content judgment, not a term lookup -> served by Haiku's topic_types:age_dosha
# (the Rule-6 split). Do not re-add as a gazetteer field without a new reason.
